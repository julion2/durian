name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly re-scan against the latest vulnerability DBs, even without code
    # changes. Catches newly-disclosed CVEs in pinned deps.
    - cron: "13 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  encryption-grep-gate:
    # ADR-0001 §6: pre-merge tripwire that fails if log/print statements
    # appear to leak values from columns the ADR marks as encrypted.
    # Cheap (~1s), runs on every PR before the heavier SAST jobs.
    name: encryption grep gate (ADR-0001 §6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gate
        run: .github/scripts/encryption-grep-gate.sh

  govulncheck:
    name: govulncheck (Go vuln DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd cli && govulncheck ./...

  gosec:
    name: gosec (Go SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # SARIF output → uploaded to GitHub code-scanning so findings
          # appear inline on PR diffs and in the Security tab.
          args: -no-fail -fmt sarif -out gosec.sarif ./cli/...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

  codeql:
    name: CodeQL (taint analysis)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
