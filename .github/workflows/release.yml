name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build CLI (darwin-arm64)
        run: |
          mkdir -p dist
          bazel build //cli/cmd/durian
          cp bazel-bin/cli/cmd/durian/durian_/durian dist/durian-darwin-arm64

      - name: Build CLI (darwin-amd64)
        run: |
          bazel build //cli/cmd/durian --platforms=@rules_go//go/toolchain:darwin_amd64
          cp bazel-bin/cli/cmd/durian/durian_/durian dist/durian-darwin-amd64

      - name: Build CLI (linux-amd64)
        run: |
          bazel build //cli/cmd/durian --platforms=@rules_go//go/toolchain:linux_amd64
          cp bazel-bin/cli/cmd/durian/durian_/durian dist/durian-linux-amd64

      - name: Build CLI (linux-arm64)
        run: |
          bazel build //cli/cmd/durian --platforms=@rules_go//go/toolchain:linux_arm64
          cp bazel-bin/cli/cmd/durian/durian_/durian dist/durian-linux-arm64

      - name: Build Sync Server (linux-amd64)
        run: |
          bazel build //sync:durian-sync --platforms=@rules_go//go/toolchain:linux_amd64
          cp bazel-bin/sync/durian-sync_/durian-sync dist/durian-sync-linux-amd64

      - name: Build Sync Server (linux-arm64)
        run: |
          bazel build //sync:durian-sync --platforms=@rules_go//go/toolchain:linux_arm64
          cp bazel-bin/sync/durian-sync_/durian-sync dist/durian-sync-linux-arm64

      - name: Build GUI
        run: |
          bazel build -c opt --define ci=true //macos:Durian
          # Repack with correct timestamps (Bazel sets 1980-01-01 for reproducibility)
          cd /tmp && unzip -o $GITHUB_WORKSPACE/bazel-bin/macos/Durian.zip -d gui_repack
          find gui_repack -exec touch {} +
          # Add CFBundleIconFile (not set when app_icons is empty in CI mode)
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" gui_repack/Durian.app/Contents/Info.plist 2>/dev/null || true
          cd gui_repack && zip -r $GITHUB_WORKSPACE/dist/Durian-${{ steps.version.outputs.version }}.zip Durian.app

      - name: Generate SBOM (CycloneDX)
        run: |
          # cyclonedx-gomod resolves the dependency tree (incl. transitive)
          # of the cli/ module and emits a CycloneDX 1.5 JSON document.
          # sync/ shares the same module so one SBOM covers both binaries.
          # Format choice: JSON over XML for grep/jq friendliness.
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cd cli
          cyclonedx-gomod app -main ./cmd/durian -output ../dist/durian-${{ steps.version.outputs.version }}.cdx.json -json -licenses

      - name: Package
        run: |
          cd dist
          tar -czf durian-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz durian-darwin-arm64
          tar -czf durian-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz durian-darwin-amd64
          tar -czf durian-${{ steps.version.outputs.version }}-linux-amd64.tar.gz durian-linux-amd64
          tar -czf durian-${{ steps.version.outputs.version }}-linux-arm64.tar.gz durian-linux-arm64
          tar -czf durian-sync-${{ steps.version.outputs.version }}-linux-amd64.tar.gz durian-sync-linux-amd64
          tar -czf durian-sync-${{ steps.version.outputs.version }}-linux-arm64.tar.gz durian-sync-linux-arm64
          shasum -a 256 *.tar.gz *.zip *.cdx.json > checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Pull out the [vX.Y.Z] section that matches GITHUB_REF_NAME.
          # CHANGELOG.md is the single source of truth — mirrored into the
          # release body byte-identically. Falls back to a one-line stub
          # pointing at CHANGELOG.md if no matching section is found.
          TAG="${GITHUB_REF_NAME}"
          if awk -v tag="$TAG" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" tag "\\]") { found = 1; print; next }
            }
            found { print }
          ' CHANGELOG.md > dist/release-notes.md && [ -s dist/release-notes.md ]; then
            echo "Extracted $(wc -l < dist/release-notes.md) lines from CHANGELOG.md for $TAG"
          else
            echo "No CHANGELOG.md entry found for $TAG — falling back to stub" >&2
            printf '## %s\n\nSee [CHANGELOG.md](https://github.com/julion2/durian/blob/main/CHANGELOG.md) for notes.\n' "$TAG" > dist/release-notes.md
          fi

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/durian-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz \
            dist/durian-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz \
            dist/durian-${{ steps.version.outputs.version }}-linux-amd64.tar.gz \
            dist/durian-${{ steps.version.outputs.version }}-linux-arm64.tar.gz \
            dist/durian-sync-${{ steps.version.outputs.version }}-linux-amd64.tar.gz \
            dist/durian-sync-${{ steps.version.outputs.version }}-linux-arm64.tar.gz \
            dist/Durian-${{ steps.version.outputs.version }}.zip \
            dist/durian-${{ steps.version.outputs.version }}.cdx.json \
            dist/checksums.txt \
            --title "Durian ${{ github.ref_name }}" \
            --notes-file dist/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM64=$(shasum -a 256 dist/durian-${VERSION}-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_AMD64=$(shasum -a 256 dist/durian-${VERSION}-darwin-amd64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(shasum -a 256 dist/durian-${VERSION}-linux-amd64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(shasum -a 256 dist/durian-${VERSION}-linux-arm64.tar.gz | cut -d' ' -f1)
          SHA_GUI=$(shasum -a 256 dist/Durian-${VERSION}.zip | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/julion2/homebrew-tap.git /tmp/tap

          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA_ARM64__/${SHA_ARM64}/g" \
              -e "s/__SHA_AMD64__/${SHA_AMD64}/g" \
              -e "s/__SHA_LINUX_AMD64__/${SHA_LINUX_AMD64}/g" \
              -e "s/__SHA_LINUX_ARM64__/${SHA_LINUX_ARM64}/g" \
              tools/brew-formula.rb.tmpl > /tmp/tap/Formula/durian.rb

          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA_GUI__/${SHA_GUI}/g" \
              tools/brew-cask.rb.tmpl > /tmp/tap/Casks/durian.rb

          cd /tmp/tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "bump durian to ${VERSION}" || true
          git push
