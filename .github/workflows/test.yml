name: Test

on:
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pkl
        run: |
          curl -sL https://github.com/apple/pkl/releases/download/0.31.1/pkl-linux-amd64 -o /usr/local/bin/pkl
          chmod +x /usr/local/bin/pkl

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-cli-${{ hashFiles('MODULE.bazel', 'cli/go.mod', 'cli/go.sum') }}
          restore-keys: bazel-cli-

      - name: Test CLI
        run: bazel test //cli/... --test_output=errors

      - name: Test API Contract
        # The integration test starts `durian serve`, which normally
        # bootstraps the ADR-0001 master key from the OS keychain.
        # Headless CI has no Secret Service implementation, so we pass
        # the key in via DURIAN_MASTER_KEY_HEX — see cmd/durian/master_key.go
        # for the bypass behaviour. The value is throwaway test data.
        run: bazel test //integration:integration_test --test_output=all

      - name: Build CLI
        run: bazel build //cli/cmd/durian

  sync:
    name: Sync Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-sync-${{ hashFiles('MODULE.bazel', 'cli/go.mod', 'cli/go.sum') }}
          restore-keys: bazel-sync-

      - name: Test Sync Server
        run: bazel test //sync:sync_test --test_output=errors

      - name: Build Sync Server
        run: bazel build //sync:durian-sync

  gui:
    name: GUI (Swift)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-gui-${{ hashFiles('MODULE.bazel', 'gui/BUILD.bazel') }}
          restore-keys: bazel-gui-

      - name: Test
        run: bazel test //macos:all --build_tests_only --test_output=errors

  linux:
    name: Linux GUI (Qt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-declarative-dev qt6-tools-dev qt6-tools-dev-tools qt6-webengine-dev libgl-dev

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-linux-${{ hashFiles('MODULE.bazel', 'linux/BUILD.bazel') }}
          restore-keys: bazel-linux-

      - name: Test Linux GUI
        run: bazel test //linux:icon_map_test //linux:thread_model_test //linux:profile_model_test --repo_env=QTDIR=/usr --test_output=errors
        env:
          QT_QPA_PLATFORM: offscreen
