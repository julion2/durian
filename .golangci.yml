# golangci-lint config — focused, not kitchen-sink. gofmt/goimports are
# handled by the gofmt CI gate in test.yml, so we don't duplicate them
# here. The enabled set is the proven-useful subset for catching real
# bugs in a small Go codebase.

run:
  timeout: 3m
  go: "1.25"

linters:
  disable-all: true
  enable:
    - govet         # reports suspicious constructs (printf-style, shadowing, atomic alignment)
    - ineffassign   # detects ineffectual assignments — common copy-paste error
    - errcheck      # forces explicit handling of returned errors
    - staticcheck   # broad set of correctness checks (dead branches, stdlib misuse)
    - unused        # dead code at function/type/var/const granularity

linters-settings:
  errcheck:
    # Functions whose error is conventionally ignored or whose failure
    # is intentionally non-fatal in this codebase.
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*database/sql.Stmt).Close
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Fprint
      - os.Unsetenv

issues:
  exclude-dirs:
    - bazel-*
    - .build
